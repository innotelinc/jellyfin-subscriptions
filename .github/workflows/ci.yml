name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  DATABASE_URL: file:./prisma/ci.db
  APP_BASE_URL: http://127.0.0.1:3000
  APP_NAME: Jellyfin Subscriptions CI
  ADMIN_EMAIL: ci@example.com
  ADMIN_USERNAME: ci-admin
  ADMIN_PASSWORD: ci-password
  ADMIN_SESSION_SECRET: ci-session-secret

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare CI database
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
